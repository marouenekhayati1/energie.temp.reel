<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚡ WattNow Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 { margin-bottom: 15px; }

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

.value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 6px;
}

.conso { color: #ef4444; }   /* 🔴 RED */
.prod { color: #22c55e; }    /* 🟢 GREEN */
.delta { color: #facc15; }

/* DEVICES */
.devices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.device {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
}

/* CHART */
.chart-container {
  margin-top: 20px;
  background: #0b1220;
  border-radius: 12px;
  padding: 12px;
  height: 320px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}
</style>
</head>

<body>

<h1>⚡ WattNow Dashboard</h1>

<div class="grid">
  <div class="card">
    <div>Consommation</div>
    <div id="conso" class="value conso">0</div>
  </div>

  <div class="card">
    <div>Production</div>
    <div id="prod" class="value prod">0</div>
  </div>

  <div class="card">
    <div>Delta</div>
    <div id="delta" class="value">0</div>
  </div>
</div>

<h3>Devices</h3>
<div class="devices" id="devices"></div>

<div class="chart-container">
  <canvas id="chart"></canvas>
</div>

<script>
const USER_ID = "us-east-1:2e44f066-1ee0-4353-9885-97ee102980bc";
const TOKEN = "PUT_YOUR_TOKEN";
const DEVICEKEY = "PUT_YOUR_DEVICE_KEY";

const URL =
`https://325qd9g4o9.execute-api.us-east-2.amazonaws.com/dev/apis.wattnow.io/dashboard/realtime/devices/lastValuesByDeviceType/${USER_ID}/${USER_ID}/tri`;

const ORDER = [
  "W3pGNRR01016",
  "W3pGNRR01017",
  "W3pGNRR01014",
  "W3pGNRR01015",
  "W3pGNRR01013",
  "W3pGNRR01012"
];

const NAME = {
  W3pGNRR01016: "Groupe 1",
  W3pGNRR01017: "Groupe 2",
  W3pGNRR01014: "Randa",
  W3pGNRR01015: "BVM",
  W3pGNRR01013: "SMT",
  W3pGNRR01012: "Auxiliaire"
};

/* 📊 FLUX CHART */
const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      {
        label: "Consommation",
        data: [],
        borderColor: "#ef4444", // 🔴 RED
        backgroundColor: "transparent",
        tension: 0.4,
        fill: false
      },
      {
        label: "Production",
        data: [],
        borderColor: "#22c55e", // 🟢 GREEN
        backgroundColor: "transparent",
        tension: 0.4,
        fill: false
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: {
      duration: 500   // 🔥 smooth flux
    },
    scales: {
      x: { ticks: { color: "white" } },
      y: { ticks: { color: "white" } }
    },
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    }
  }
});

function toKw(v) {
  return v ? parseFloat(v) / 1000 : 0;
}

async function load() {
  try {
    const res = await fetch(URL, {
      headers: {
        accesstoken: TOKEN,
        devicekey: DEVICEKEY,
        userregion: "us-east-2"
      }
    });

    const raw = await res.json();

    const map = {};

    raw.forEach(d => {
      const id = d.deviceId || d.device_id;
      const val = d.all_value || d.value || 0;
      map[id] = toKw(val);
    });

    const g1 = map["W3pGNRR01016"] || 0;
    const g2 = map["W3pGNRR01017"] || 0;
    const randa = map["W3pGNRR01014"] || 0;
    const bvm = map["W3pGNRR01015"] || 0;
    const smt = map["W3pGNRR01013"] || 0;
    const aux = (map["W3pGNRR01012"] || 0) * 2;

    const conso = randa + bvm + smt + aux;
    const prod = g1 + g2;
    const delta = prod - conso;

    document.getElementById("conso").innerText = conso.toFixed(2);
    document.getElementById("prod").innerText = prod.toFixed(2);
    document.getElementById("delta").innerText = delta.toFixed(2);

    /* devices */
    let html = "";
    ORDER.forEach(id => {
      let v = map[id] || 0;
      if (id === "W3pGNRR01012") v = v * 2;

      html += `
        <div class="device">
          <b>${NAME[id]}</b><br/>
          ${v.toFixed(2)} kW
        </div>
      `;
    });

    document.getElementById("devices").innerHTML = html;

    /* 🔥 FLOW GRAPH (moving window) */
    chart.data.labels.push("");

    chart.data.datasets[0].data.push(conso);
    chart.data.datasets[1].data.push(prod);

    if (chart.data.labels.length > 25) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
      chart.data.datasets[1].data.shift();
    }

    chart.update();

  } catch (e) {
    console.log(e);
  }
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
