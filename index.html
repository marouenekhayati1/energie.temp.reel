<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚡ WattNow Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  margin-bottom: 15px;
}

/* GRID TOP CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

.value {
  font-size: 24px;
  font-weight: bold;
  margin-top: 6px;
}

.yellow { color: #facc15; }
.green { color: #22c55e; }

/* DEVICES */
.devices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.device {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
}

/* CHART */
.chart-container {
  margin-top: 20px;
  background: #0b1220;
  border-radius: 12px;
  padding: 12px;
  height: 320px;
}
